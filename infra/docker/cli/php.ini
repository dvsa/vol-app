; PHP's initialization file, generally called php.ini, is responsible for
; configuring many of the aspects of PHP's behavior.
; For more information on the config file, please see:
; https://www.php.net/manual/en/index.php

[PHP]
; Maximum amount of memory a script may consume
; https://php.net/memory-limit
memory_limit=3584M

[session]
; Handler used to serialize data. php is the standard serializer of PHP.
; https://php.net/session.serialize-handler
session.serialize_handler=igbinary

[opcache]
; The maximum number of keys (and therefore scripts) in the OPcache hash table.
opcache.max_accelerated_files=65407

; Total shared memory available to opcache. 512 MB comfortably holds the compiled
; bytecode of all loaded files plus headroom for vendor/Doctrine proxies.
opcache.memory_consumption=512

; Required by Doctrine ORM 2 annotation reader — must remain 1.
opcache.save_comments=1

; Validate timestamps of scripts on each request.
opcache.validate_timestamps=1

; Specifies the frequency at which OPcache checks for changes to PHP scripts
; in the filesystem. The value is in seconds.
opcache.revalidate_freq=60

; Enable the cli
opcache.enable_cli=1

[Performance]
realpath_cache_size=4096K
realpath_cache_ttl=600
