name: Secrets scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: 0 0 * * 1
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  secrets:
    uses: dvsa/.github/.github/workflows/secrets-scan.yaml@v5.0.11
    with:
      # Full-history scan on the weekly cron run; PRs scan working tree only.
      scan-history: ${{ github.event_name == 'schedule' }}
