name: Deploy and Test

concurrency:
  group: ${{ github.workflow }}-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      environment: { type: string, required: true }
      account: { type: string, required: true }
      api-image-tag: { type: string, required: true }
      cli-image-tag: { type: string, required: true }
      selfserve-image-tag: { type: string, required: true }
      internal-image-tag: { type: string, required: true }
      assets-version: { type: string, required: true }
      aws_role: { type: string, required: true }
      bucket_name: { type: string, required: true }
      bucket_key: { type: string, required: true }
      batch_job_queue: { type: string, required: true }
      batch_job_definition: { type: string, required: true }
      etl_ref: { type: string, required: true }
      release: { type: boolean, required: true }
    secrets:
      VOL_GITHUB_APP_PRIVATE_KEY:
        required: true

jobs:
  terraform_env_plan:
    name: Environment Plan
    if: ${{ inputs.account == 'prod' }}
    concurrency:
      group: terraform-environment-${{ inputs.environment }}
    uses: ./.github/workflows/deploy-environment.yaml
    with:
      environment: ${{ inputs.environment }}
      api-image-tag: ${{ inputs.api-image-tag }}
      cli-image-tag: ${{ inputs.cli-image-tag }}
      selfserve-image-tag: ${{ inputs.selfserve-image-tag }}
      internal-image-tag: ${{ inputs.internal-image-tag }}
      assets-version: ${{ inputs.assets-version }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    secrets: inherit

  terraform_env:
    name: Environment Apply
    if: ${{ always() && !cancelled() && !failure() }}
    needs: [terraform_env_plan]
    concurrency:
      group: terraform-environment-${{ inputs.environment }}
    uses: ./.github/workflows/deploy-environment.yaml
    with:
      environment: ${{ inputs.environment }}
      api-image-tag: ${{ inputs.api-image-tag }}
      cli-image-tag: ${{ inputs.cli-image-tag }}
      selfserve-image-tag: ${{ inputs.selfserve-image-tag }}
      internal-image-tag: ${{ inputs.internal-image-tag }}
      assets-version: ${{ inputs.assets-version }}
      apply: true
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    secrets: inherit

  liquibase:
    name: Database Migrations
    if: ${{ always() && !cancelled() && !failure() && needs.terraform_env.result == 'success' }}
    needs: [terraform_env]
    uses: ./.github/workflows/run-liquibase.yaml
    with:
      push: false
      submit_job: true
      account: ${{ inputs.account }}
      environment: ${{ inputs.environment }}
      dry_run: false
      etl_ref: ${{ inputs.etl_ref }}
    permissions:
      contents: read
      id-token: write
    secrets:
      VOL_GITHUB_APP_PRIVATE_KEY: ${{ secrets.VOL_GITHUB_APP_PRIVATE_KEY }}

  test_batch:
    name: Run Batch Jobs
    if: ${{ always() && !cancelled() && !failure() && needs.terraform_env.result == 'success' && inputs.environment == 'int' }}
    needs: [terraform_env, liquibase]
    uses: dvsa/vol-functional-tests/.github/workflows/e2eAwsBatchJobsSmoke.yaml@v4.21.0
    with:
      platform_env: ${{ inputs.environment }}
      aws_role: ${{ inputs.aws_role }}
      bucket_name: ${{ inputs.bucket_name }}
      bucket_key: ${{ inputs.bucket_key }}
      batch_job_queue: ${{ inputs.batch_job_queue }}
      batch_job_definition: ${{ inputs.batch_job_definition }}
    permissions:
      contents: write
      id-token: write
      checks: write

  approve_batch:
    name: Approve Batch Failure
    if: ${{ always() && inputs.release == true && (needs.test_batch.result == 'failure' || needs.test_batch.result == 'cancelled') }}
    needs: [test_batch]
    runs-on: ubuntu-latest
    environment: test-approval
    steps:
      - run: echo "Batch approved"

  test_smoke:
    name: Smoke Tests
    if: |
      always() &&
      !cancelled() &&
      needs.terraform_env.result == 'success' &&
      (
        needs.test_batch.result == 'success' ||
        (inputs.release == true && needs.approve_batch.result == 'success')
      ) &&
      inputs.environment != 'prod' &&
      inputs.environment != 'prep'
    needs: [terraform_env, liquibase, test_batch, approve_batch]
    uses: dvsa/vol-functional-tests/.github/workflows/e2eSmoke.yaml@v4.23.0
    with:
      platform_env: ${{ inputs.environment }}
      aws_role: ${{ inputs.aws_role }}
      bucket_name: ${{ inputs.bucket_name }}
      bucket_key: ${{ inputs.bucket_key }}
      batch_job_queue: ${{ inputs.batch_job_queue }}
      batch_job_definition: ${{ inputs.batch_job_definition }}
    permissions:
      contents: write
      id-token: write
      checks: write

  approve_smoke:
    name: Approve Smoke Failure
    if: ${{ always() && inputs.release == true && (needs.test_smoke.result == 'failure' || needs.test_smoke.result == 'cancelled') }}
    needs: [test_smoke]
    runs-on: ubuntu-latest
    environment: test-approval
    steps:
      - run: echo "Smoke approved"

  test_prep_smoke:
    name: Prep Smoke Tests
    if: |
      always() &&
      !cancelled() &&
      needs.terraform_env.result == 'success' &&
      (
        needs.test_batch.result == 'success' ||
        (inputs.release == true && needs.approve_batch.result == 'success')
      ) &&
      inputs.environment == 'prep'
    needs: [terraform_env, liquibase, test_batch, approve_batch]
    uses: dvsa/vol-functional-tests/.github/workflows/e2ePrepSmoke.yaml@v4.23.0
    with:
      platform_env: ${{ inputs.environment }}
      aws_role: ${{ inputs.aws_role }}
      bucket_name: ${{ inputs.bucket_name }}
      bucket_key: ${{ inputs.bucket_key }}
      batch_job_queue: ${{ inputs.batch_job_queue }}
      batch_job_definition: ${{ inputs.batch_job_definition }}
    permissions:
      contents: write
      id-token: write
      checks: write

  approve_prep:
    name: Approve Prep Failure
    if: ${{ always() && inputs.release == true && (needs.test_prep_smoke.result == 'failure' || needs.test_prep_smoke.result == 'cancelled') }}
    needs: [test_prep_smoke]
    runs-on: ubuntu-latest
    environment: test-approval
    steps:
      - run: echo "Prep approved"

  test_selfserve:
    name: Selfserve Regression Tests
    if: |
      always() &&
      !cancelled() &&
      needs.terraform_env.result == 'success' &&
      inputs.environment == 'int' &&
      (
        needs.test_smoke.result == 'success' ||
        (inputs.release == true && needs.approve_smoke.result == 'success')
      )
    needs: [test_smoke, approve_smoke]
    uses: dvsa/vol-functional-tests/.github/workflows/e2eSelfServeRegression.yaml@v4.23.0
    with:
      platform_env: ${{ inputs.environment }}
      aws_role: ${{ inputs.aws_role }}
      bucket_name: ${{ inputs.bucket_name }}
      bucket_key: ${{ inputs.bucket_key }}
      batch_job_queue: ${{ inputs.batch_job_queue }}
      batch_job_definition: ${{ inputs.batch_job_definition }}
    permissions:
      contents: write
      id-token: write
      checks: write

  test_internal:
    name: Internal Regression Tests
    if: |
      always() &&
      !cancelled() &&
      needs.terraform_env.result == 'success' &&
      inputs.environment == 'int' &&
      (
        needs.test_smoke.result == 'success' ||
        (inputs.release == true && needs.approve_smoke.result == 'success')
      )
    needs: [test_smoke, approve_smoke]
    uses: dvsa/vol-functional-tests/.github/workflows/e2eInternalRegression.yaml@v4.23.0
    with:
      platform_env: ${{ inputs.environment }}
      aws_role: ${{ inputs.aws_role }}
      bucket_name: ${{ inputs.bucket_name }}
      bucket_key: ${{ inputs.bucket_key }}
      batch_job_queue: ${{ inputs.batch_job_queue }}
      batch_job_definition: ${{ inputs.batch_job_definition }}
    permissions:
      contents: write
      id-token: write
      checks: write

  approve_selfserve:
    name: Approve Selfserve Failure
    if: ${{ always() && inputs.release == true && (needs.test_selfserve.result == 'failure' || needs.test_selfserve.result == 'cancelled') }}
    needs: [test_selfserve]
    runs-on: ubuntu-latest
    environment: test-approval
    steps:
      - run: echo "Selfserve approved"

  approve_internal:
    name: Approve Internal Failure
    if: ${{ always() && inputs.release == true && (needs.test_internal.result == 'failure' || needs.test_internal.result == 'cancelled') }}
    needs: [test_internal]
    runs-on: ubuntu-latest
    environment: test-approval
    steps:
      - run: echo "Internal approved"

  #  test_accessibility:
  #    name: Accessibility Tests (Will not fail)
  #    if: ${{ always() && !cancelled() && !failure() && needs.terraform_env.result == 'success' && inputs.environment == 'int' }}
  #    needs:
  #      - terraform_env
  #      - test_selfserve
  #      - test_internal
  #    uses: dvsa/vol-functional-tests/.github/workflows/e2eAccessibility.yaml@v4.18.2
  #    with:
  #      platform_env: ${{ inputs.environment }}
  #      aws_role: ${{ inputs.aws_role }}
  #      bucket_name: ${{ inputs.bucket_name }}
  #      bucket_key: ${{ inputs.bucket_key }}
  #      batch_job_queue: ${{ inputs.batch_job_queue }}
  #      batch_job_definition: ${{ inputs.batch_job_definition }}
  #      batch_timeout_minutes: 60
  #    permissions:
  #      contents: write
  #      id-token: write
  #      checks: write

  rollback:
    name: Rollback Deployment
    if: |
      always() &&
      needs.terraform_env.result == 'success' &&
      inputs.environment != 'dev' &&
      (
        (needs.test_smoke.result != 'success' &&
         (inputs.release != true || needs.approve_smoke.result != 'success')) ||

        (needs.test_selfserve.result != 'success' &&
         (inputs.release != true || needs.approve_selfserve.result != 'success')) ||

        (needs.test_internal.result != 'success' &&
         (inputs.release != true || needs.approve_internal.result != 'success')) ||

        (needs.test_prep_smoke.result != 'success' &&
         (inputs.release != true || needs.approve_prep.result != 'success'))
      )
    needs:
      - terraform_env
      - test_smoke
      - test_selfserve
      - test_internal
      - test_prep_smoke
      - approve_smoke
      - approve_selfserve
      - approve_internal
      - approve_prep
    concurrency:
      group: terraform-environment-${{ inputs.environment }}
    uses: ./.github/workflows/deploy-environment.yaml
    with:
      environment: ${{ inputs.environment }}
      rollback: true
      apply: true
      api-image-tag: ${{ needs.terraform_env.outputs.previous_api_image_tag }}
      cli-image-tag: ${{ needs.terraform_env.outputs.previous_cli_image_tag }}
      selfserve-image-tag: ${{ needs.terraform_env.outputs.previous_selfserve_image_tag }}
      internal-image-tag: ${{ needs.terraform_env.outputs.previous_internal_image_tag }}
      assets-version: ${{ needs.terraform_env.outputs.previous_assets_version }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    secrets: inherit
