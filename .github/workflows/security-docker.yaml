name: Security

on:
  workflow_call:
  schedule:
    # Weekly on Monday at 00:00 UTC
    - cron: 0 0 * * 1

jobs:
  docker-scan:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Scan Configs with Grype
        uses: anchore/scan-action@v6
        id: scan
        with:
          path: "infra/docker"
          severity-cutoff: medium
          fail-build: true
          output-format: sarif
          # Note: Grype will scan the files in the directory for package vulnerabilities.
          # To exclude specific sub-directories, use a .grypeignore file or adjust the scan path accordingly.

      - name: Upload Results to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}